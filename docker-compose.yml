version: "3.8"

services:
  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - db_data:/app/data
      - ./backend/gmail_token.json:/app/gmail_token.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
