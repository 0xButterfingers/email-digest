# HTTP → HTTPS redirect for reports subdomain
server {
    listen 80;
    server_name reports.0xbutterfingers.xyz;
    return 301 https://$host$request_uri;
}

# HTTPS — reports.0xbutterfingers.xyz (main app)
server {
    listen 443 ssl;
    server_name reports.0xbutterfingers.xyz;

    ssl_certificate /etc/letsencrypt/live/reports.0xbutterfingers.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reports.0xbutterfingers.xyz/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        client_max_body_size 20M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTP → HTTPS redirect for archive subdomain
server {
    listen 80;
    server_name archive.0xbutterfingers.xyz;
    return 301 https://$host$request_uri;
}

# HTTPS — archive.0xbutterfingers.xyz (email archive)
server {
    listen 443 ssl;
    server_name archive.0xbutterfingers.xyz;

    ssl_certificate /etc/letsencrypt/live/archive.0xbutterfingers.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/archive.0xbutterfingers.xyz/privkey.pem;

    root /app/email-archive;

    location / {
        autoindex on;
        try_files $uri $uri/ =404;
    }
}

# Default — plain IP access (HTTP only)
server {
    listen 80 default_server;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        client_max_body_size 20M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
